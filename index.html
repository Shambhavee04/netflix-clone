<!DOCTYPE html>
<html>
<head>
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <h1 style="color:red;">NETFLIX</h1>

  <input 
    type="text" 
    id="search" 
    placeholder="Search..." 
    style="padding:8px; border-radius:5px;">
</div>

<!-- Banner -->
<div id="banner" class="banner">
  <div class="banner-contents">
    <h1 id="banner-title" class="banner-title"></h1>

    <div class="banner-buttons">
      <button id="playBtn" class="banner-button">▶ Play</button>
      <button  id="infoBtn" class="banner-button">ℹ More Info</button>
    </div>

    <p id="banner-desc" class="banner-desc"></p>
  </div>

  <div class="banner-fadeBottom"></div>
</div>

<!-- Rows -->
<div class="row">
  <h2>Trending</h2>
  <div id="trending" class="row-posters"></div>
</div>

<div class="row">
  <h2>Top Rated</h2>
  <div id="topRated" class="row-posters"></div>
</div>

<div class="row">
  <h2>Action</h2>
  <div id="action" class="row-posters"></div>
</div>

<!-- Modal -->
<div id="trailerModal" class="modal">
  <span id="closeModal" class="close">✖</span>
  <iframe id="trailerVideo" frameborder="0" allowfullscreen></iframe>
</div>

<script src="script.js"></script>

</body>
</html>
